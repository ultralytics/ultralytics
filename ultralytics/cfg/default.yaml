# Global configuration YAML with settings and hyperparameters for YOLO training, validation, prediction and export
# For documentation see https://docs.ultralytics.com/usage/cfg

task: detect # (str) YOLO task, i.e. detect, segment, semantic, classify, pose, obb
mode: train # (str) YOLO mode, i.e. train, val, predict, export, track, benchmark

# Train settings -------------------------------------------------------------------------------------------------------
model: # (str, optional) path to model file, i.e. yolo26n.pt or yolo26n.yaml
data: # (str, optional) path to data file, i.e. coco8.yaml
epochs: 100 # (int) number of epochs to train for
time: # (float, optional) max hours to train; overrides epochs if set
patience: 100 # (int) early stop after N epochs without val improvement
batch: 16 # (int | float) batch size as int (e.g. 16), or float 0.0–1.0 for AutoBatch fraction of GPU memory
imgsz: 640 # (int | list) train/val use int (square); predict/export may use [h,w]
save: True # (bool) save train checkpoints and predict results
save_period: -1 # (int) save checkpoint every N epochs; disabled if < 1
cache: False # (bool | str) cache images in RAM (True/'ram') or on 'disk' to speed dataloading; False disables
device: # (int | str | list) device: 0 or [0,1,2,3] for CUDA, 'cpu'/'mps', or -1/[-1,-1] to auto-select idle GPUs
workers: 8 # (int) dataloader workers (per RANK if DDP)
project: # (str, optional) project name for results root
name: # (str, optional) experiment name; results in 'project/name'
exist_ok: False # (bool) overwrite existing 'project/name' if True
pretrained: True # (bool | str) use pretrained weights (bool) or load weights from path (str)
optimizer: auto # (str) optimizer: SGD, MuSGD, Adam, Adamax, AdamW, NAdam, RAdam, RMSProp, or auto
verbose: True # (bool) print verbose logs during training/val
seed: 0 # (int) random seed for reproducibility
deterministic: True # (bool) enable deterministic ops; reproducible but may be slower
single_cls: False # (bool) treat all classes as a single class
rect: False # (bool) rectangular batches for train; rectangular batching for val when mode='val'
cos_lr: False # (bool) cosine learning rate scheduler
close_mosaic: 10 # (int) disable mosaic augmentation for final N epochs (0 to keep enabled)
lsj: False # (bool) use large scale jittering (scale 0.5-2.0, translate 0.5) during the close_mosaic epochs
resume: False # (bool) resume training from last checkpoint in the run dir
amp: True # (bool) Automatic Mixed Precision (AMP) training; True runs AMP capability check
fraction: 1.0 # (float) fraction of training dataset to use (1.0 = all)
profile: False # (bool) profile ONNX/TensorRT speeds during training for loggers
freeze: # (int | list, optional) freeze first N layers (int) or specific layer indices (list)
multi_scale: 0.0 # (float) multi-scale range as a fraction of imgsz; sizes are rounded to stride multiples
compile: False # (bool | str) enable torch.compile() backend='inductor'; True="default", False=off, or "default|reduce-overhead|max-autotune-no-cudagraphs"

# Segmentation
overlap_mask: True # (bool) merge instance masks into one mask during training (segment only)
mask_ratio: 4 # (int) mask downsample ratio (segment only)

# Classification
dropout: 0.0 # (float) dropout for classification head (classify only)

# Val/Test settings ----------------------------------------------------------------------------------------------------
val: True # (bool) run validation/testing during training
split: val # (str) dataset split to evaluate: 'val', 'test' or 'train'
save_json: False # (bool) save results to COCO JSON (detect/segment/pose) or PNG masks (semantic) for external evaluation
conf: # (float, optional) confidence threshold; defaults: predict=0.25, val=0.001
iou: 0.7 # (float) IoU threshold used for NMS
max_det: 300 # (int) maximum number of detections per image
half: False # (bool) use half precision (FP16) if supported
dnn: False # (bool) use OpenCV DNN for ONNX inference
plots: True # (bool) save plots and images during train/val
end2end: # (bool, optional) whether to use end2end head (YOLO26, YOLOv10) for predict/val/export

# Predict settings -----------------------------------------------------------------------------------------------------
source: # (str, optional) path/dir/URL/stream for images or videos; e.g. 'ultralytics/assets' or '0' for webcam
vid_stride: 1 # (int) read every Nth frame for video sources
stream_buffer: False # (bool) True buffers all frames; False keeps the most recent frame for low-latency streams
visualize: False # (bool) visualize model features (predict) or TP/FP/FN confusion (val)
augment: False # (bool) apply test-time augmentation during prediction
agnostic_nms: False # (bool) class-agnostic NMS
classes: # (int | list[int], optional) filter by class id(s), e.g. 0 or [0,2,3]
retina_masks: False # (bool) use high-resolution segmentation masks (segment)
embed: # (list[int], optional) return feature embeddings from given layer indices

# Visualize settings ---------------------------------------------------------------------------------------------------
show: False # (bool) show images/videos in a window if supported
save_frames: False # (bool) save individual frames from video predictions
save_txt: False # (bool) save results as .txt files (xywh format)
save_conf: False # (bool) save confidence scores with results
save_crop: False # (bool) save cropped prediction regions to files
show_labels: True # (bool) draw class labels on images, e.g. 'person'
show_conf: True # (bool) draw confidence values on images, e.g. '0.99'
show_boxes: True # (bool) draw bounding boxes on images
line_width: # (int, optional) line width of boxes; auto-scales with image size if not set

# Export settings ------------------------------------------------------------------------------------------------------
format: torchscript # (str) target format, e.g. torchscript|onnx|openvino|engine|coreml|saved_model|pb|tflite|edgetpu|tfjs|paddle|mnn|ncnn|imx|rknn|executorch|axelera|deepx|qnn
keras: False # (bool) TF SavedModel only (format=saved_model); enable Keras layers during export
optimize: False # (bool) TorchScript: mobile optimizations; DEEPX: higher compiler optimization (slower compile, faster inference)
int8: False # (bool) INT8/PTQ where supported (openvino, engine, coreml, tflite, tfjs, mnn, imx, rknn, axelera, deepx); needs calibration data/fraction
dynamic: False # (bool) dynamic shapes for torchscript, onnx, openvino, engine, coreml; enable variable image sizes
simplify: True # (bool) ONNX/engine only; run graph simplifier for cleaner ONNX before runtime conversion
opset: # (int, optional) ONNX/engine only; opset version for export; leave unset to use a tested default
workspace: # (float, optional) engine (TensorRT) only; workspace size in GiB, e.g. 4
nms: False # (bool) fuse NMS into exported model when backend supports; if True, conf/iou apply (agnostic_nms except coreml)

# Hyperparameters ------------------------------------------------------------------------------------------------------
lr0: 0.01 # (float) initial learning rate (SGD=1e-2, Adam/AdamW=1e-3)
lrf: 0.01 # (float) final LR fraction; final LR = lr0 * lrf
momentum: 0.937 # (float) SGD momentum or Adam beta1
weight_decay: 0.0005 # (float) weight decay (L2 regularization)
warmup_epochs: 3.0 # (float) warmup epochs (fractions allowed)
warmup_momentum: 0.8 # (float) initial momentum during warmup
warmup_bias_lr: 0.1 # (float) bias learning rate during warmup
box: 7.5 # (float) box loss gain
cls: 0.5 # (float) classification loss gain
cls_pw: 0.0 # (float) class weights power for handling class imbalance (0.0=disable, 1.0=full inverse frequency)
o2o_neg_focal_gamma: 0.0 # (float) one2one BCE negative-only focal gamma (0.0=disable)
o2o_cls_hard: False # (bool) use hard 0/1 classification targets for one2one instead of IoU soft targets
o2o_pos_cls: 0.0 # (float) one2one positive-only GT-class classification loss gain (0.0=disable)
o2o_pos_cls_p3_only: False # (bool) restrict o2o_pos_cls to matched positives on the finest P3 level
o2o_small_cls_gain: 1.0 # (float) o2o P3 positive GT-class cls loss gain to lift small-object confidence (1.0=disable)
o2o_small_cls_area: 0.0 # (float) >0 switches o2o_small_cls_gain to continuous area-based weighting (letterbox px^2 threshold); 0=P3-level
o2o_small_target_gamma: 1.0 # (float) exponent for raising small-object o2o targets (1.0=disable, try 0.5)
o2o_small_target_full: 32.0 # (float) 640-equivalent GT side at or below which the full target exponent is used
o2o_small_target_end: 64.0 # (float) 640-equivalent GT side at or above which targets remain unchanged
o2o_obj: 1.0 # (float) one2one class-agnostic objectness loss gain (DetectO2OObj* heads; BCE toward the o2m foreground graded by the one2one box IoU)
o2o_obj_fuse: 1.0 # (float) DetectO2OObjBox logit-fusion weight; score = sigmoid(cls_logit + o2o_obj_fuse * obj_logit) at inference and in the cls loss (obj detached); 0 disables
o2o_quality: False # (bool) DetectO2OObjBox quality mode: branch regresses the o2o box IoU at the single o2o positive, cls uses a hard target, score = cls_prob * IoU_pred (product)
vfl: False # (bool) use Varifocal Loss instead of BCE for classification
vfl_o2m: True # (bool) when vfl=True, also apply Varifocal Loss to the one2many branch (False = one2one branch only)
vfl_norm: False # (bool) when vfl=True, normalize Varifocal Loss by positive count instead of target score sum
vfl_hard: False # (bool) when vfl=True, regress positives toward hard 1.0 target instead of the IoU soft target
o2f: False # (bool) use one-to-few assignment on the branch selected by o2f_branch
o2f_branch: o2o # (str) branch that uses one-to-few assignment: 'o2o' or auxiliary 'o2m'
o2f_topk: 7 # (int) number of shared classification/regression candidates when o2f=True
o2f_iou: amb_max # (str) ambiguous-target IoU: 'amb_max' (ambiguous-set max) or 'self' (own IoU)
o2f_norm: align # (str) when o2f=True, ambiguous-anchor normalization metric: 'align' (task alignment) or 'prob' (predicted GT-class prob)
o2f_max_t: 0.6 # (float) when o2f=True, initial ambiguous-anchor positive degree (start of the linear decay)
o2f_min_t: 0.2 # (float) when o2f=True, final ambiguous-anchor positive degree (end of the linear decay)
o2m: True # (bool) train the auxiliary one2many head (False = train the one2one branch only)
o2o_from_o2m: False # (bool) one2one takes its topk candidate pool from the one2many positive set (ranked by o2m align)
o2o_ft: False # (bool) fine-tune the one2one head only: copy o2m->o2o weights, freeze+eval the trunk (backbone+neck+o2m head), train o2o at full weight
o24: False # (bool) aux head uses o2o-style 1:1 matching on 4x-duplicated GTs instead of one2many
distill: 0.0 # (float) online cls distillation gain: pull one2one cls toward one2many at one2one positives (0=off)
rank: 0.0 # (float) one2one ranking-loss gain (RS-style pairwise surrogate, folded into the one2one cls loss; 0=off)
rank_tau: 0.5 # (float) when rank>0, ranking-loss temperature (smaller = closer to hard ranking)
rank_k_neg: 100 # (int) when rank>0, per image/class keep only the top-K highest-scoring negatives
rank_w_sort: 0.5 # (float) when rank>0, weight of the IoU-sort term relative to the rank term
rank_w_rank: 1.0 # (float) when rank>0, weight of the rank term (set 0 to train the sort term alone)
rank_p3_only: False # (bool) when rank>0, apply the ranking loss only to the finest (P3, smallest-stride) level
rank_in_gt: False # (bool) when rank>0, draw rank negatives from each positive's own GT box instead of top-K image scores
rank_agn: False # (bool) when rank>0, class-agnostic image-wide ranking: push positives above the top-K hardest background anchors' max-class score
rank_logits: False # (bool) when rank>0, rank on raw logits instead of sigmoid probabilities
stride_val_thr: False # (bool) enlarge every GT smaller than stride_val (not just smaller than the smallest stride) up to stride_val during candidate selection
stride_val_size: # (float, optional) when stride_val_thr, override the shared min-wh threshold & enlarge value (empty=stride_val)
small_center_fill: False # (bool) replace under-covered GT candidate masks with the K nearest P3 anchors
small_center_fill_branch: o2m # (str) end-to-end branch using small_center_fill: 'o2o', 'o2m', or 'both'
small_center_fill_k: 4 # (int) minimum/exact P3 candidate count for under-covered GTs
dfl: 1.5 # (float) distribution focal loss gain
l1_feat: False # (bool) when reg_max=1, compute box L1 loss in feature-map (grid) scale instead of image-normalized
smooth_l1: False # (bool) when reg_max=1, use Smooth L1 (Huber) loss for box regression instead of L1
smooth_l1_beta: 1.0 # (float) transition point between the quadratic and linear regions of smooth_l1
center: 0.0 # (float) when reg_max=1, gain of an auxiliary box-center offset ((r-l)/2, (b-t)/2) L1 loss (0=off)
pose: 12.0 # (float) pose loss gain (pose tasks)
kobj: 1.0 # (float) keypoint objectness loss gain (pose tasks)
rle: 1.0 # (float) rle loss gain (pose tasks)
angle: 1.0 # (float) oriented angle loss gain (obb tasks)
nbs: 64 # (int) nominal batch size used for loss normalization
hsv_h: 0.015 # (float) HSV hue augmentation fraction
hsv_s: 0.7 # (float) HSV saturation augmentation fraction
hsv_v: 0.4 # (float) HSV value (brightness) augmentation fraction
degrees: 0.0 # (float) rotation degrees (+/-)
translate: 0.1 # (float) translation fraction (+/-)
scale: 0.5 # (float | tuple) scale gain (+/-) as float, or explicit (min, max) tuple
shear: 0.0 # (float) shear degrees (+/-)
perspective: 0.0 # (float) perspective fraction (0–0.001 typical)
flipud: 0.0 # (float) vertical flip probability
fliplr: 0.5 # (float) horizontal flip probability
bgr: 0.0 # (float) RGB↔BGR channel swap probability
mosaic: 1.0 # (float) mosaic augmentation probability
mixup: 0.0 # (float) MixUp augmentation probability
cutmix: 0.0 # (float) CutMix augmentation probability
copy_paste: 0.0 # (float) segmentation copy-paste probability
copy_paste_mode: flip # (str) copy-paste strategy for segmentation: flip or mixup
auto_augment: randaugment # (str) classification auto augmentation policy: randaugment, autoaugment, augmix
erasing: 0.4 # (float) random erasing probability for classification (0.0–1.0)

# Custom config.yaml ---------------------------------------------------------------------------------------------------
cfg: # (str, optional) path to a config.yaml that overrides defaults

# Tracker settings ------------------------------------------------------------------------------------------------------
tracker: botsort.yaml # (str) tracker config: botsort.yaml, bytetrack.yaml, ocsort.yaml, deepocsort.yaml, fasttrack.yaml, tracktrack.yaml
