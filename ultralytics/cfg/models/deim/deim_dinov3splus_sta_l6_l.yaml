# Hybrid DEIM config: DEIMv2-X backbone (dinov3_vits16plus, SwiGLU ratio=6) with
# DEIMv2-L head/neck/decoder sizing. Keeps the richer ViT backbone for accuracy
# while applying L-sized hidden_dim (224), AIFI/decoder FFN widths, RepNCSPELAN5
# c3/c4/n, and STA conv_inplane=32 to reduce downstream compute. ndl=6 is kept
# so inference-time depth can be tuned via DeimDecoder eval_idx without retraining.
# Model docs: https://docs.ultralytics.com/models/rtdetr
# Task docs: https://docs.ultralytics.com/tasks/detect

# Parameters
nc: 80 # number of classes

backbone:
  # [from, repeats, module, args]
  # Backbone is dinov3_vits16plus (kept from XL) but projected into the L hidden_dim=224.
  # Parser args: [out_ch, name, pretrained, interaction_indexes, finetune, patch_size, use_sta, conv_inplane, hidden_dim, split]
  - [-1, 1, DEIMDINOv3STAs, [224, dinov3_vits16plus, True, [5, 8, 11], True, 16, True, 32, 224, True]] # 0
  - [0, 1, Index, [224, 1]] # 1 P3
  - [0, 1, Index, [224, 2]] # 2 P4
  - [0, 1, Index, [224, 3]] # 3 P5

head:
  # DEIMv2-L HybridEncoder head sizing on top of the splus backbone.
  - [3, 1, nn.Identity, []] # 4 input_proj.2
  - [-1, 1, AIFI, [896, 8]]
  - [-1, 1, Conv, [224, 1, 1, None, 1, 1, False]] # 6 Y5, lateral_convs.0

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [2, 1, nn.Identity, []] # 8 input_proj.1
  - [[-2, -1], 1, Add, []]
  - [-1, 1, RepNCSPELAN5, [224, 448, 112, 2]] # 10 fpn_blocks.0
  - [-1, 1, Conv, [224, 1, 1, None, 1, 1, False]] # 11 Y4, lateral_convs.1

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [1, 1, nn.Identity, []] # 13 input_proj.0
  - [[-2, -1], 1, Add, []]
  - [-1, 1, RepNCSPELAN5, [224, 448, 112, 2]] # 15 X3, fpn_blocks.1

  - [-1, 1, SCDown, [224, 3, 2, False]] # 16 downsample_convs.0
  - [[-1, 11], 1, Add, []]
  - [-1, 1, RepNCSPELAN5, [224, 448, 112, 2]] # 18 F4, pan_blocks.0

  - [-1, 1, SCDown, [224, 3, 2, False]] # 19 downsample_convs.1
  - [[-1, 6], 1, Add, []]
  - [-1, 1, RepNCSPELAN5, [224, 448, 112, 2]] # 21 F5, pan_blocks.1

  # DeimDecoder: L sizing (hd=224, d_ffn=1792), 6 layers kept for eval_idx flexibility.
  # Set eval_idx in {1,2,3,4} at inference time to early-exit; -1 runs all 6.
  - [[15, 18, 21], 1, DeimDecoder, [nc, 224, 300, [3, 6, 3], 8, 6, 1792, 0.0, "silu", -1, 100, 0.5, 1.0, False, False, 0, False, False, "default", 32, 4.0, 1.0, "silu", "unshared", True, False, False]]

loss:
  gamma: 1.5
  alpha: 0.75
  use_fl: False
  use_vfl: False
  use_mal: True
  use_union_set: True
  reg_max: 32
  loss_gain: {class: 1, bbox: 5, giou: 2, fgl: 0.15, ddf: 1.5}
  matcher:
    cost_gain: {class: 2, bbox: 5, giou: 2}
    use_fl: True
    alpha: 0.25
    gamma: 2.0
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 50
