# mega_v11_quick: real-GT only (no ImageNet pseudo) for the 2026-05-22 ablation.
# Original mega_v11 took ~8h/epoch at imgsz=768; dropping the 1.28M ImageNet pseudo
# brings per-epoch wall-clock to ~4h, fitting the 'directional read in one day' goal.
#
# Train composition:
#   arkitscenes  676,080
#   diode         18,660
#   hypersim      68,242
#   kitti         60,040
#   sunrgbd        9,245
#   tartanair     55,660
#   vkitti2       25,780
#   total       ~913,707

path: mega_v11_quick  # dataset root dir (relative to Ultralytics settings 'datasets_dir')
train: images/train
val: images/val
nc: 1
names:
  0: depth
channels: 3
