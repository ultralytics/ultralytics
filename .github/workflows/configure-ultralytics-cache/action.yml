name: Configure Ultralytics Cache Paths
description: Sets Ultralytics weights_dir and datasets_dir to the GitHub workspace cache folder.

runs:
  using: composite
  steps:
    - name: Configure Ultralytics cache paths
      shell: bash
      run: |
        python -c "
        from ultralytics import settings
        import os
        cache = os.path.join(os.environ['GITHUB_WORKSPACE'], '.ultralytics_cache')
        settings.update({
            'weights_dir': os.path.join(cache, 'weights'),
            'datasets_dir': os.path.join(cache, 'datasets'),
            'runs_dir': os.path.join(cache, 'runs'),
        })
        "
