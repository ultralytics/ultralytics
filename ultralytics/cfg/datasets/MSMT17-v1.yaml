# MSMT17 V1 person re-identification dataset (layout present on ultra1)
# Root: /home/rick/.cache/autoresearch/MSMT17_V1  (flat split dirs + list_*.txt)
# V1 filename: 0000_000_01_0303morning_0015_0.jpg -> pid_seq_camid_date_frame_suffix
# Example usage: yolo reid val data=MSMT17-v1.yaml model=yolo26l-reid.pt

# Dataset root directory
path: MSMT17_V1
train: train      # training images (flat dir; pid/camid from filename)
val: query        # query images for evaluation
gallery: gallery  # gallery images matched against queries

# Classes (training identities)
nc: 1041

# Filename regex preset for MSMT17 V1 (camid is 0-indexed)
filename_re: msmt17_v1
cam_0indexed: true
