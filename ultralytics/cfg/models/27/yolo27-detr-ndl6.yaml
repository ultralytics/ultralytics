# YOLO27-DETR object detection model with P3/8 - P5/32 outputs (6-decoder-layer variant).
# YOLO26-style CSP trunk + RTDETRDecoderV2 head (parent-equivalent at efficient_ms=False, ndl=6).
# Source weights: yolo27s-detr-objv2.pt (from yolo26S, Objects365 V2) / yolo26L_rtdetr_obj365.pt (from yolo26L).
# Task: detect. RTDETRDecoderV2 is named so the dispatch routes this model to YOLODETR.
# This variant keeps the original 6-layer decoder; see yolo27l-detr.yaml for the 4-layer truncated variant.

# Parameters
nc: 80 # number of classes
scales:
  # [depth, width, max_channels]
  s: [0.50, 0.50, 1024]
  l: [1.00, 1.00, 512]

# YOLO26 CSP backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]] # 5-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5, 3, True]] # 9
  - [-1, 2, C2PSA, [1024]] # 10

# YOLO26 FPN/PAN + RTDETRDecoder
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]] # cat backbone P4
  - [-1, 2, C3k2, [512, True]] # 13

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]] # cat backbone P3
  - [-1, 2, C3k2, [256, True]] # 16 (P3/8-small)

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]] # cat head P4
  - [-1, 2, C3k2, [512, True]] # 19 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]] # cat head P5
  - [-1, 1, C3k2, [1024, True, 0.5, True]] # 22 (P5/32-large)

  # RTDETRDecoderV2. Args (ch is auto-filled from `from` refs). Positional order:
  # [nc, hd, nq, ndp, nh, ndl, d_ffn, dropout]. Trailing constructor defaults are omitted.
  # ndl=6: matches the source training for both yolo27s-detr-objv2.pt and yolo26L_rtdetr_obj365.pt.
  # eval_idx=-1 (default) means inference reads from layer 5 (the last layer).
  - [[16, 19, 22], 1, RTDETRDecoderV2, [nc, 256, 300, 4, 8, 6, 1024, 0.0]]
