# KITTI Stereo Detection dataset by Karlsruhe Institute of Technology and Toyota Technological Institute at Chicago
# Documentation: https://www.cvlibs.net/datasets/kitti/
# Example usage: yolo train data=kitti-stereo.yaml
#
# Label format (18 values): class x_l y_l w_l h_l x_r y_r w_r h_r dim_l dim_w dim_h loc_x loc_y loc_z rot_y truncated occluded
# Where: x_l,y_l,w_l,h_l = left 2D box (normalized), x_r,y_r,w_r,h_r = right 2D box (normalized)
#        dim_l,dim_w,dim_h = 3D dimensions (length, width, height in meters)
#        loc_x,loc_y,loc_z = 3D location (camera coords), rot_y = rotation around Y-axis (radians)
# parent
# ├── ultralytics
# └── datasets
#     └── kitti-stereo ← downloads here (~1.9 GB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: kitti-stereo # dataset root dir
train: images/train/left # train images (left stereo) (relative to 'path')
val: images/val/left # val images (left stereo) (relative to 'path')

# Stereo image pairs (for stereo-based 3D detection)
train_right: images/train/right # train images (right stereo) (relative to 'path')
val_right: images/val/right # val images (right stereo) (relative to 'path')

# Classes (same as KITTI detection)
names:
  0: Car
  1: Van
  2: Truck
  3: Pedestrian
  4: Person_sitting
  5: Cyclist
  6: Tram
  7: Misc

# Download
download: https://github.com/ultralytics/assets/releases/download/v0.0.0/kitti-stereo.zip

# Stereo calibration parameters
# baseline is used as fallback when per-image calib files are missing
baseline: 0.54 # distance between left and right cameras (meters)

# Mean dimensions per class [length, width, height] in meters
# Internally converted to (H, W, L) order by val.py:_parse_dims() for training
mean_dims:
  Car: [3.9, 1.6, 1.5] # [length, width, height] in meters
  Van: [4.8, 2.0, 2.0]
  Truck: [10.0, 2.8, 3.5]
  Pedestrian: [0.8, 0.6, 1.7]
  Person_sitting: [0.9, 0.6, 1.2]
  Cyclist: [1.8, 0.6, 1.7]
  Tram: [12.0, 2.5, 3.5]
  Misc: [3.0, 2.0, 2.0]

# Standard deviation of dimensions per class [length, width, height] in meters
# Used for normalized offset prediction: (dim - mean) / std
# Same [L, W, H] order as mean_dims; also converted to (H, W, L) internally
std_dims:
  Car: [0.42, 0.10, 0.15] # [std_length, std_width, std_height]
  Van: [0.50, 0.15, 0.20]
  Truck: [0.80, 0.30, 0.50]
  Pedestrian: [0.20, 0.08, 0.12]
  Person_sitting: [0.15, 0.08, 0.10]
  Cyclist: [0.25, 0.10, 0.15]
  Tram: [1.00, 0.30, 0.50]
  Misc: [0.50, 0.20, 0.50]

# Number of input channels (6 = left RGB + right RGB)
# Siamese backbone still uses 6ch input, processed via batch trick [2B, 3, H, W]
channels: 6

# Pseudo-label curriculum for auto-labeled auxiliary classes.
# Controls how much pseudo-labels contribute to 3D aux losses (depth, dims, orient, lr_dist).
# Detection losses (cls, box) always use full weight regardless of these settings.
pseudo_labels:
  weight: 0.5 # aux loss weight for stereo-matched pseudo-labels (occ=10)
  mono_weight: 0.0 # aux loss weight for mono-only pseudo-labels (occ=20)
  cutoff: 0.9 # epoch fraction after which pseudo-labels contribute 0 to aux losses
