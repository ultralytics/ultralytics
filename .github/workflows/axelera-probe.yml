name: axelera-probe
on:
  push:
    branches: [axelera-probe]
jobs:
  reliability:
    if: github.repository == 'ultralytics/ultralytics'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        run: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4
        with: { ref: axelera-rollback-smoke }
      - uses: actions/setup-python@v6
        with: { python-version: "3.13" }
      - uses: astral-sh/setup-uv@v7
        with: { python-version: "3.13" }
      - run: sudo apt-get update && sudo apt-get install -y openjdk-21-jre flatbuffers-compiler
      - run: uv pip install --system -e ".[export-base]" pytest "git+https://github.com/ultralytics/CLIP.git" --torch-backend cpu
      - name: cache_weights (full CI context)
        env: { YOLO_AUTOINSTALL: "false" }
        run: python -c "from tests.cache_test_assets import cache_weights; cache_weights(slow=True)"
      - name: isolated-axelera smoke via create-export-env (run ${{ matrix.run }})
        env: { ULTRALYTICS_ISOLATED_VENVS: "${{ runner.temp }}/venvs", YOLO_AUTOINSTALL: "false" }
        run: |
          python .github/scripts/create-export-env.py --env isolated-axelera > /tmp/o.log 2>&1; EXIT=$?
          NP=$(grep -oE '[+] numpy==[0-9.]+|numpy==[0-9.]+' /tmp/o.log | head -1 | tr -d '+ ')
          RES=$(grep -oE 'export (success|failure)[^"]*MB\)|output model too small' /tmp/o.log | tail -1)
          echo "REL_RESULT run=${{ matrix.run }} exit=$EXIT $NP | ${RES:-<none>}"
