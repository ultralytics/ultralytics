# Revisited Oxford5k landmark retrieval (EVAL-ONLY). Identity = landmark group.
# Protocol note: standard same-identity mAP over landmark groups (not the official
# easy/medium/hard split). Zero-shot only — there is no training split.
path: rOxford5k
train: query # eval-only dataset has no train split; never used (ft disabled in campaign)
val: query
gallery: gallery
nc: 12 # 11 classic landmarks + the 'oxford' general query group from the revisitop query list
