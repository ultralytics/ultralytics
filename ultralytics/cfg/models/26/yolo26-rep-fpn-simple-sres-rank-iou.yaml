# YOLO26 NMS-free variant: rank-pair penalty on one2one (second-best anchor per GT pushed below top-1 by margin).

# Parameters
nc: 80 # number of classes
end2end: True # whether to use end-to-end mode
reg_max: 1 # DFL bins
rank_pair: True
rank_margin: 0.5
rank_weight: 1.0
rank_iou_gate: 0.5  # only penalize rank-2 if its pred box IoU with rank-1 > gate (real duplicate). 0=off
rank_min_area: 1024  # skip GTs with area < this many px² (32x32). Protects small objects. 0=off
scales: # model compound scaling constants, i.e. 'model=yolo26n.yaml' will call yolo26.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO26n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2Simple, [256, False, 0.5]] # 2 - simple block, e=0.5
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2Simple, [512, False, 0.5]] # 4 - simple block, e=0.5
  - [-1, 1, Conv, [512, 3, 2]] # 5-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5, 3, True]] # 9
  - [-1, 2, C2PSA, [1024]] # 10

# YOLO26n head
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 3, C3k2Rep, [512, True]]  # increase depth

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 3, C3k2Rep, [256, True]]  # increase depth

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]]
  - [-1, 2, C3k2Rep, [512, True]]  # increase depth

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 2, C3k2Rep, [1024, True, 0.5, True]] # 22
  - [[-1, 10], 1, ScaledAdd, []]  # 23: scaled residual from backbone P5

  - [[16, 19, 23], 1, Detect, [nc]]
