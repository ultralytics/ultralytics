# Mixed depth dataset: NYU real + COCO pseudo-labels from DA V2 teacher
# Used for knowledge distillation training of YOLO depth models

path: depth_anything  # dataset root dir (relative to Ultralytics settings 'datasets_dir')
train:
  - nyu_yolo/images/train        # 795 real NYU indoor images
  - coco_pseudo/images/train2017  # ~118K COCO images with DA V2 pseudo-depth
val: nyu_yolo/images/val          # 654 real NYU val images (always real for eval)

nc: 1
names:
  0: depth

channels: 3
