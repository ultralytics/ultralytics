# 不写 val_dataset_fractions 时，验证遍历各 val 集的全部图片
# 三个数据集示例：train: [A, B, C]  train_dataset_fractions: [0.2, 0.3, 0.5]
train_dataset_fractions: [0.75, 0.25]
val_dataset_fractions: [0.75, 0.25]

