# mega_v11: mega_v10 (2.13M) + KITTI real outdoor (improved annotated GT, both cams) = ~2.19M train
#
# Adds the first REAL outdoor depth to the mix (mega_v10 had only synthetic vKITTI2 + TartanAir).
# Source: KITTI `data_depth_annotated.zip` (Uhrig et al. 2017) — densified sparse Velodyne GT
# (~16-20% valid pixels, multi-view consistency filtered). Both image_02 (left) and image_03
# (right) rectified frames included.
#
# Eigen test drives (28 sequences from Eigen et al. 2014) are excluded from train and placed
# in val for held-out evaluation:
#   2011_09_26: 0002, 0009, 0013, 0020, 0023, 0027, 0029, 0036, 0046, 0048,
#               0052, 0056, 0059, 0064, 0084, 0086, 0093, 0096, 0101, 0106, 0117
#   2011_09_28: 0002
#   2011_09_29: 0026, 0071
#   2011_09_30: 0016
#   2011_10_03: 0034, 0042, 0047
#
# Conversion: uint16 PNG (meters * 256) -> float32 .npy meters, 0 = invalid.
# Prep script: <internal>
# Eval mirror: <internal> for eval_kitti_aligned.py
#
# Train composition:
#   arkitscenes    676,080
#   diode           18,660
#   hypersim        68,242
#   kitti           60,040   (NEW — real outdoor, left+right cams, Eigen drives excluded)
#   sunrgbd          9,245
#   tartanair       55,660
#   vkitti2         25,780
#   imagenet_v3  1,281,167   (DA3 mono+metric pseudo-depth)
#   total       ~2,194,874
#
# Val composition (no imagenet — real-GT only):
#   arkitscenes    21,559
#   diode             771
#   hypersim        6,377
#   kitti          32,378   (NEW — all 28 Eigen test drives, both cams)
#   sunrgbd         1,090
#   tartanair       5,810
#   vkitti2        16,740
#   total          ~84,725

path: mega_v11  # dataset root dir (relative to Ultralytics settings 'datasets_dir')
train: images/train
val: images/val
nc: 1
names:
  0: depth
channels: 3
