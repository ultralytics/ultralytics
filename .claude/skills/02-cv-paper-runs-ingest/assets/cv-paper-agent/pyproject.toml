[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "cv-paper-agent"
version = "0.1.0"
description = "Offline CV paper-writing agent with resume checkpoints"
requires-python = ">=3.9"
dependencies = [
  "pyyaml",
  "pandas",
  "matplotlib",
  "pillow",
]

[project.scripts]
cv-paper-agent = "cv_paper_agent.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
