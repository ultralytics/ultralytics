# YOLO Anomaly v2 — MoCo FIFO bank (100k) + softhint-aug1 weak prior augs. Combines the two
# prior-robustness ingredients: GT batches (prior_mode=None, 1-mb_blend_p of steps) get the
# aug1 structural augmentations (jitter / box-drop / distractor / erase / warp / mixup +
# randomized gauss width) teaching "prior can be wrong, missing or extra"; heatmap batches
# feed the raw FIFO-bank heatmap (the real inference-prior distribution, fixed beta=5 —
# auto-calib rails at the clamp on self-dense queue banks and saturates contrast).
# 100k capacity = middle ground between the 50k (sparse) and 1M (3-day runtime) arms.
# Intended for multi-class training (merge_data_v5_multiclass_clean, nc=35).
# Branch: yoloa_v2_queryfilm.

nc: 80
end2end: True
reg_max: 1
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

anomaly_v2:
  mask_size: 80
  mask_mode: gauss
  sigma_factor: [0.15, 0.45]     # per-bbox width randomization (train); midpoint at eval
  p_drop: 0.5
  seg_branch: false
  bb_layers: [6]
  bb_temperature: 5.0            # FIXED beta (see mocobank-1m.yaml: auto-calib rails on queues)
  bb_K: 9
  bb_auto_temperature: false
  bb_calibration_target_score: 0.5
  bb_calibrate: compactness      # unused in queue mode; kept for parity
  mb_queue_capacity: 100000      # FIFO slots (~200 MB fp32)
  mb_blend_p: 0.5                # P(prior_mode="heatmap") per training batch
  fusion_mode: film
  film_groups: 16
  film_group_dim: 16
  # --- softhint-aug1 weak prior-robustness augments (GT batches only by code gate) ---
  mask_jitter: 0.02
  mask_box_drop_p: 0.1
  mask_distractor_p: 0.25
  mask_distractor_n: 2
  mask_erase_p: 0.15
  mask_warp_p: 0.15
  mask_mixup_p: 0.15
  mask_mixup_alpha: 0.4

backbone:
  - [-1, 1, Conv, [64, 3, 2]]
  - [-1, 1, Conv, [128, 3, 2]]
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]]
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5, 3, True]]
  - [-1, 2, C2PSA, [1024]]

head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, True]]

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]]
  - [-1, 2, C3k2, [256, True]]

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]]
  - [-1, 2, C3k2, [512, True]]

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 10], 1, Concat, [1]]
  - [-1, 1, C3k2, [1024, True, 0.5, True]]

  - [[16, 19, 22], 1, Detect, [nc]]
