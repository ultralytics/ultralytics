# mega_v10: 6 raw real-GT datasets (~880K) + ImageNet pseudo-depth from DA3 MONO-L
# + DA3METRIC-LARGE per-image robust affine refinement (1.28M) = ~2.16M train
#
# Pseudo-depth pipeline (see <internal>
#   d_mono   = DA3MONO-LARGE(image)           # relative
#   d_metric = DA3METRIC-LARGE(image)         # meters, scale anchor
#   a, b     = robust affine fit on valid pixels
#   d_refined = clip(a*d_mono + b, 0.05, 80.0)
# Generated 2026-05-13 on ultra4 across GPUs 2-7. uint16 PNG (scale 80m/65535)
# were converted to .npy float16 meters for loader compatibility.
#
# Train composition:
#   arkitscenes  676,080
#   diode         18,660
#   hypersim      68,242
#   sunrgbd        9,245
#   tartanair     55,660
#   vkitti2       25,780
#   imagenet_v3 1,281,167
#   total      ~2,134,834
#
# Val composition (no imagenet — keep val real-GT only):
#   arkitscenes  21,559
#   diode           771
#   hypersim      6,377
#   sunrgbd       1,090
#   tartanair     5,810
#   vkitti2      16,740
#   total       ~52,347

path: mega_v10  # dataset root dir (relative to Ultralytics settings 'datasets_dir')
train: images/train
val: images/val
nc: 1
names:
  0: depth
channels: 3
