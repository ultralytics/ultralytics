# Pascal VOC 2012 semantic segmentation dataset
# Documentation: http://host.robots.ox.ac.uk/pascal/VOC/voc2012/

path: voc2012-semseg
train: images/train
val: images/val

# Semantic mask directory (PNG files, pixel values = class IDs, 255 = ignore/void)
masks_dir: masks

# VOC 21-class labels (0=background + 20 object classes)
names:
  0: background
  1: aeroplane
  2: bicycle
  3: bird
  4: boat
  5: bottle
  6: bus
  7: car
  8: cat
  9: chair
  10: cow
  11: diningtable
  12: dog
  13: horse
  14: motorbike
  15: person
  16: pottedplant
  17: sheep
  18: sofa
  19: train
  20: tvmonitor
