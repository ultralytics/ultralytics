# YOLOA fit config — all fit params in one file (single source of truth).
# Precedence at fit(): this yaml > model yaml v2_cfg defaults.
# To customize: copy this file, edit it, pass --fit-cfg <your_copy>.yaml



# -- Feature extraction (backbone tap) ----------------------------------
imgsz: 640
bb_layers: [6]             # backbone tap indices (P3/P4/P5 for yolo26m)

# -- Bank-build knobs ---------------------------------------------------
max_images: 0              # 0 = all normal images
bb_max_bank_size: 10000    # coreset cap (unset/None = no cap, use full bank)
bb_holdout_max: 5000          # max holdout samples for calibration (speed cap)
bb_K: 5                    # top-K for Noisy-OR scoring
bb_temperature: 5.0        # β = sigmoid steepness (higher = more sensitive to small deviations)
bb_calibration_target_score: 0.4    # tail target — Gaussian μ+z·σ ≈ this
bb_calibration_target_quantile: 0.95  # quantile for the tail (0.95 → z≈1.645)




# -- Heatmap post-processing (inference only) ---------------------------
bb_hmap_stretch_strength: 0.   # quadratic stretch hmap+=s*hmap² (0=off, 0.5=moderate, ONNX-safe)
heat_edge: true             # edge-suppression on the heatmap
heat_edge_sigma: 1.0         # edge sigma (bigger = gentler)
heat_norm: none              # none | minmax | gaussian | mean — prior norm before fusion
# heatmap conf gate: p_anom *= blend + (1-blend)*hm — 0 = gate fully ON, 1 = off.
# Read by BOTH run_yoloa.py and the in-training MVTec OOD eval, so the two stay aligned.
hm_gate_blend: 1.0
