# MSMT17 V1 person re-identification dataset (folder-per-identity layout)
# Paper: https://arxiv.org/abs/1711.08565
# Example usage: yolo reid train data=MSMT17-v1.yaml model=yolo26s-reid.yaml

# Dataset root directory (expects folder-per-identity layout for all splits)
path: MSMT17_V1
train: train # 32621 images, 1041 identities
val: query # 11659 query images (symlinked by pid), 3060 identities
gallery: gallery # 82161 gallery images (symlinked by pid), 3060 identities

# Classes (training identities)
nc: 1041

# V1 filename format: 0000_000_01_0303morning_0015_0.jpg
# pid (group 1) is taken from the folder name; camid is group 2 (position 3 in filename)
filename_re: msmt17_v1
cam_0indexed: false # camid in filename is 01..15 (1-indexed)
