#
# Best single-model ReID training recipe (no ensemble).
# Use with: yolo reid train cfg=reid_best.yaml model=... data=... pretrained=...
#
# ─── RECIPE ──────────────────────────────────────────────────────────────────
#   model:       yolo26l-reid-2psa.yaml  (yolo26l + 2 stacked C2PSA attention blocks)
#   pretrained:  an MSMT17-pretrained checkpoint (a short MSMT fine-tune first)
#   data:        Market-1501.yaml
#   result:      Market-1501  Rank-1 ≈ 0.929  mAP ≈ 0.891  (imgsz=448, + reranking + flip TTA)
#   imgsz:       R1 climbs monotonically 288 → 448 (peak at 448), then saturates/regresses by 512.
#
# ─── LEVERS THAT MATTER (ordered by impact) ───────────────────────────────────
#   1. supcon_temp=0.02 (replaces batch-hard triplet)  -> +2-5pp R1
#   2. erasing=0.7 (vs 0.5 default)                     -> +0.5-0.7pp Market R1
#   3. label_smoothing=0.1 + focal_gamma=0.0            -> +0.4pp R1
#   4. triplet_margin=0.5 (vs 0.3)                      -> +2.3pp R1 (triplet and supcon modes both benefit)
#   5. cos_lr=True                                      -> +0.2pp Market R1
#   6. dropout=0.1-0.2                                  -> helps MSMT R1 (small Market regression)
#   7. larger imgsz up to 448 (square input; rectangular is catastrophic on YOLO backbones)
#
# ─── LEVERS THAT HURT ─────────────────────────────────────────────────────────
#   ArcFace; erasing >= 0.9; lr0 >= 5e-3; GeM / Non-Local pooling; IBN-Net; a 3rd C2PSA block;
#   ViT/CLIP backbone (large gap vs CNN here); over-long pretrain or fine-tune (both overfit).
#   Takeaway: 2 stacked C2PSA is the optimum — architectural ADDITIONS to a well-pretrained
#   model don't help; the real lever is pretrain quality / data.
#
# ─── CROSS-DATASET TRADE-OFF ──────────────────────────────────────────────────
#   - Best overall:   cos_lr=True,  dropout=0.1   (wins Duke, strong on Market)
#   - MSMT-leaning:   cos_lr=False, dropout=0.2
#   - Pure Market R1: cos_lr=True,  dropout=0.0
#
# Reference (ResNet-50 BoT): mAP=0.859 R1=0.945; with k-reciprocal rerank mAP=0.942 R1=0.954.

# --- Task ---
task: reid                # required so `cfg=reid_best.yaml` validates ReID-only keys (reid_p, supcon_temp, ...)

# --- Optimizer / schedule ---
optimizer: AdamW
lr0: 3.5e-3
lrf: 0.001
weight_decay: 0.01
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
momentum: 0.937
cos_lr: True
amp: False                # AMP triggers NaN with C2PSA attention on yolo26 — keep False for ReID

# --- ReID loss ---
triplet_margin: 0.5
triplet_weight: 1.0
ce_weight: 2.0
center_weight: 0.005
center_momentum: 0.9
focal_gamma: 0.0          # focal CE off — hurts ReID R1 on this stack
label_smoothing: 0.1      # mild smoothing helps
supcon_temp: 0.02         # 0 -> use batch-hard triplet; >0 -> SupCon replaces triplet (better)
arcface: False            # margin softmax tested and hurt; keep off

# --- Sampler ---
reid_p: 24
reid_k: 8

# --- Augmentation ---
imgsz: 448                # champion; R1 peaks at 448 then saturates/regresses by 512.
                          # Square input; rectangular is catastrophic on YOLO backbones (verified).
erasing: 0.7              # stronger than classification default; key for Market R1
fliplr: 0.5
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
auto_augment: randaugment
scale: 0.5

# --- Training ---
batch: 192                # multi-GPU DDP total batch (per-GPU = batch / world_size)
time: 3.0                 # ~1300 epochs at imgsz=320 yolo26l on a 4-GPU DDP run
val: False                # ReID val is run as a separate `yolo reid val ... reid_reranking=True reid_tta=True` step
dropout: 0.1              # 0.0 for pure Market R1; 0.2 for MSMT-leaning
