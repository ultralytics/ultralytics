#
# Best ReID training recipe found by ablation campaign (yolo26l, Combined-ReID train, rerank+TTA eval).
# Single model, no ensemble. Use with: yolo reid train cfg=reid_best.yaml model=... data=... pretrained=...
#
# Headline result (Market-1501, run "HH" = this recipe):
#   mAP=0.894  Rank-1=0.929  (tied with EE within run variance ±0.003)
# DukeMTMC-reID (run "HH"):
#   mAP=0.745  Rank-1=0.812  (best across all runs)
# MSMT17-v1 (run "HH"):
#   mAP=0.496  Rank-1=0.662  (set dropout=0.2 for MSMT-leaning 0.667)
#
# Reference comparisons:
#   BoT (ResNet-50, no rerank):  mAP=0.859  Rank-1=0.945
#   BoT (ResNet-50, +k-rerank):  mAP=0.942  Rank-1=0.954
#
# Levers that matter (each tested vs base, ordered by impact):
#   1. supcon_temp=0.02 (replaces batch-hard triplet)  -> +2-5pp R1 across datasets
#   2. erasing=0.7 (vs 0.5 default)                    -> +0.5-0.7pp Market R1
#   3. label_smoothing=0.1 + focal_gamma=0.0           -> +0.4pp R1
#   4. triplet_margin=0.5 (vs 0.3)                     -> +2.3pp R1 (when triplet active; supcon mode also benefits)
#   5. cos_lr=True                                     -> +0.2pp Market R1
#   6. dropout=0.1-0.2                                 -> +0.5-1.6pp MSMT R1 (small Market regression)
#   7. time=3h DDP (vs 1.5h)                           -> +0.4pp Market R1, +0.6pp Duke R1
#
# Levers that hurt: ArcFace, erasing>=0.9, lr0>=5e-3, imgsz=384 (at batch=128), yolo26x at smaller batch.
#
# Cross-dataset trade-off:
# - Best overall (HH, this recipe):  cos_lr=True,  dropout=0.1   — wins Duke, ties EE on Market
# - MSMT R1 favors:                  cos_lr=False, dropout=0.2   — set those for MSMT-leaning workloads (R1=0.667)
# - Pure Market R1 (EE):             cos_lr=True,  dropout=0.0   — R1=0.930 (within ±0.001 of HH's 0.929)

# --- Optimizer / schedule ---
optimizer: AdamW
lr0: 3.5e-3
lrf: 0.001
weight_decay: 0.01
warmup_epochs: 3
warmup_momentum: 0.8
warmup_bias_lr: 0.1
momentum: 0.937
cos_lr: True
amp: False                # AMP triggers NaN with C2PSA attention on yolo26 — keep False for ReID

# --- ReID loss ---
triplet_margin: 0.5
triplet_weight: 1.0
ce_weight: 2.0
center_weight: 0.005
center_momentum: 0.9
focal_gamma: 0.0          # focal CE off — hurts ReID R1 on this stack
label_smoothing: 0.1      # mild smoothing helps
supcon_temp: 0.02         # 0 -> use batch-hard triplet; >0 -> SupCon replaces triplet (better)
arcface: False            # margin softmax tested and hurt; keep off

# --- Sampler ---
reid_p: 24
reid_k: 8

# --- Augmentation ---
imgsz: 320                # square input; rectangular is catastrophic on YOLO backbones
erasing: 0.7              # stronger than classification default; key for Market R1
fliplr: 0.5
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
auto_augment: randaugment
scale: 0.5

# --- Training ---
batch: 192                # 4-GPU DDP; total batch (per-GPU = batch / world_size)
time: 3.0                 # 3h gets ~1300 epochs at imgsz=320 yolo26l on 4-GPU DDP
val: False                # ReID val is run as a separate `yolo reid val ... reid_reranking=True reid_tta=True` step
dropout: 0.1              # 0.0 for pure Market R1; 0.2 for MSMT-leaning
