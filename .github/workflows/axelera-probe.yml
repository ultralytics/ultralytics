name: axelera-probe
on:
  push:
    branches: [axelera-probe]
jobs:
  compare-refs:
    if: github.repository == 'ultralytics/ultralytics'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: old-good-5de90f9
            ref: 5de90f9eb4b2058ebb3419204d481efa0cc7e729
          - label: current-pr-247b48b
            ref: 247b48b5052478bac507354740294e59c8ef757c
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ matrix.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y openjdk-21-jre flatbuffers-compiler
      - run: uv pip install --system -e ".[export-base]" pytest "git+https://github.com/ultralytics/CLIP.git" --torch-backend cpu
      - name: Run isolated Axelera export for ${{ matrix.label }}
        env:
          ULTRALYTICS_ISOLATED_VENVS: ${{ runner.temp }}/venvs
          YOLO_AUTOINSTALL: "false"
        run: |
          set -x
          python .github/scripts/create-export-env.py --env isolated-axelera || export CREATE_EXIT=$?
          AX_VENV=$(find "${{ runner.temp }}/venvs" -maxdepth 1 -name 'isolated-axelera' | head -1)
          if [ -n "$AX_VENV" ]; then "$AX_VENV/bin/python" -m pip list | grep -iE 'axelera|onnx|^torch |^numpy ' | sed "s/^/PROBE_SUBPKG label=${{ matrix.label }} /"; fi
          M=$(find "${{ runner.temp }}/venvs" -name '*.axm' 2>/dev/null | head -1)
          BYTES=${M:+$(stat -c%s "$M")}
          echo "PROBE_RESULT label=${{ matrix.label }} ref=${{ matrix.ref }} axm_bytes=${BYTES:-0} create_exit=${CREATE_EXIT:-0}"
          test "${BYTES:-0}" -gt 100000
